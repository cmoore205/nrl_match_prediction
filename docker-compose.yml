x-job-base: &job-base
  image: nrl-prediction:latest
  build: .
  env_file: .env
  depends_on:
    db:
      condition: service_healthy
  profiles:
    - jobs
services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: nrl
      POSTGRES_PASSWORD: nrl
      POSTGRES_DB: nrl
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nrl"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend
  
  api:
    image: nrl-prediction:latest
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - frontend
      - backend
  
  ingest:
   <<: *job-base
   command: ["python", "-m", "nrl.jobs.ingest"]
   networks:
    - frontend ## needs the internet egress
    - backend

  train:
   <<: *job-base
   command: ["python", "-m", "nrl.jobs.train"]
   networks:
    - backend

  predict:
   <<: *job-base
   command: ["python", "-m", "nrl.jobs.predict"]
   networks:
    - backend
    
  score:
   <<: *job-base
   command: ["python", "-m", "nrl.jobs.score"]
   networks:
    - backend
    
networks:
  frontend:
  backend:
    internal: true

volumes:
  pgdata: