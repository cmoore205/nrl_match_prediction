services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: nrl
      POSTGRES_PASSWORD: nrl
      POSTGRES_DB: nrl
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nrl"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend
  
  api:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - frontend
      - backend

networks:
  frontend:
  backend:
    internal: true

volumes:
  pgdata: